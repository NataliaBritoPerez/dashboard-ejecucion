<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejecución Presupuestaria · Cabildo Insular de La Palma</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#1B3A6B 0%,#0d2444 100%);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    .card{background:white;border-radius:20px;padding:48px 40px;text-align:center;
      width:340px;box-shadow:0 24px 48px rgba(0,0,0,.35)}
    .logo{width:72px;height:72px;background:#1B3A6B;border-radius:16px;
      margin:0 auto 20px;display:flex;align-items:center;justify-content:center;
      font-size:26px;font-weight:900;color:white;letter-spacing:-1px}
    .inst{font-size:13px;color:#888;margin-bottom:4px;font-weight:500}
    .title{font-size:22px;font-weight:800;color:#1B3A6B;margin-bottom:6px;line-height:1.2}
    .periodo{font-size:13px;color:#aaa;margin-bottom:36px}
    .btn{display:block;padding:16px 24px;background:#1B3A6B;color:white;
      text-decoration:none;border-radius:12px;font-size:16px;font-weight:700;
      transition:background .2s;letter-spacing:.3px}
    .btn:hover{background:#2C5F9E}
    .fecha{font-size:11px;color:#ccc;margin-top:20px}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">CP</div>
    <div class="inst">Cabildo Insular de La Palma</div>
    <div class="title">Ejecución Presupuestaria 2026</div>
    <div class="periodo">Seguimiento semanal del presupuesto</div>
    <a class="btn" href="dashboard_ejecucion.html">Consultar Ejecución</a>
    <div class="fecha">Datos actualizados semanalmente</div>
  </div>
</body>
</html>
