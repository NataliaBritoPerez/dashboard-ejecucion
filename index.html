<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Información Presupuestaria · Cabildo Insular de La Palma</title>
  <meta property="og:title" content="Información Presupuestaria 2026 · Cabildo Insular de La Palma">
  <meta property="og:description" content="Ejecución del presupuesto insular y Período Medio de Pago por áreas.">
  <meta property="og:image" content="https://nataliabritoperez.github.io/dashboard-ejecucion/preview.png">
  <meta property="og:url" content="https://nataliabritoperez.github.io/dashboard-ejecucion/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1B3A6B">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#1B3A6B 0%,#0d2444 100%);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:24px}
    .card{background:white;border-radius:20px;padding:40px 36px;text-align:center;
      width:360px;box-shadow:0 24px 48px rgba(0,0,0,.35)}
    .logo{width:72px;height:72px;background:#1B3A6B;border-radius:16px;
      margin:0 auto 20px;display:flex;align-items:center;justify-content:center;
      font-size:26px;font-weight:900;color:white;letter-spacing:-1px}
    .inst{font-size:13px;color:#888;margin-bottom:4px;font-weight:500}
    .title{font-size:21px;font-weight:800;color:#1B3A6B;margin-bottom:6px;line-height:1.2}
    .sub{font-size:13px;color:#aaa;margin-bottom:32px}
    .btn{display:flex;align-items:center;gap:12px;padding:15px 20px;background:#1B3A6B;color:white;
      text-decoration:none;border-radius:12px;font-size:15px;font-weight:700;
      transition:background .2s;margin-bottom:12px}
    .btn:hover{background:#2C5F9E}
    .btn:last-of-type{margin-bottom:0;background:#1a3a5c}
    .btn:last-of-type:hover{background:#1e4a7a}
    .btn-ico{font-size:22px;flex-shrink:0}
    .btn-txt{text-align:left;line-height:1.3}
    .btn-txt span{display:block;font-size:11px;font-weight:400;opacity:.8;margin-top:1px}
    .fecha{font-size:11px;color:#ccc;margin-top:20px}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">CP</div>
    <div class="inst">Cabildo Insular de La Palma</div>
    <div class="title">Información Presupuestaria 2026</div>
    <div class="sub">Área de Hacienda</div>
    <a class="btn" href="dashboard_ejecucion.html">
      <div class="btn-ico">📊</div>
      <div class="btn-txt">Ejecución Presupuestaria<span>Seguimiento semanal del presupuesto</span></div>
    </a>
    <a class="btn" href="pmp_areas.html">
      <div class="btn-ico">⏱</div>
      <div class="btn-txt">Período Medio de Pago<span>Desglose mensual por áreas gestoras</span></div>
    </a>
    <div class="fecha">Área de Hacienda · actualización periódica</div>
  </div>
  <script>
    if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
  </script>
</body>
</html>
